<nav class="toc toc-fixed" aria-label="On this page">
  <div class="toc-title">On this page</div>
  <ul class="toc-list" id="toc"></ul>
</nav>
<script>
  (function(){
    function initToc(){
      var toc = document.getElementById('toc');
      if(!toc) return;
      var headers = document.querySelectorAll('article.content h2');
      var makeId = function(txt){return txt.toLowerCase().trim().replace(/[^a-z0-9\s-]/g,'').replace(/\s+/g,'-');};
      var linkById = {};

      toc.innerHTML = "";
      headers.forEach(function(h){
        if(!h.id){ h.id = makeId(h.textContent || h.innerText || 'section'); }
        var li = document.createElement('li');
        var a = document.createElement('a');
        a.href = '#' + h.id; a.textContent = h.textContent || h.innerText;
        linkById[h.id] = a;
        li.appendChild(a); toc.appendChild(li);
      });

      function setActive(id){
        var cur = toc.querySelector('a.active');
        if(cur) cur.classList.remove('active');
        var next = linkById[id];
        if(next) next.classList.add('active');
      }
      function onScroll(){
        var pos = window.scrollY + 140;
        var current = headers[0] ? headers[0].id : null;
        for(var i=0;i<headers.length;i++){
          if(headers[i].offsetTop <= pos){ current = headers[i].id; }
        }
        if(current) setActive(current);
      }
      window.addEventListener('scroll', onScroll, {passive:true});
      window.addEventListener('load', onScroll);
      onScroll();
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initToc);
    } else {
      initToc();
    }
  })();
</script>
